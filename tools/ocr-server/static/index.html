<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星塔作業 → Preset JSON</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 800px; margin: 0 auto; }

    h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.2rem; }
    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 1.5rem; }

    .card {
      background: #1e2330;
      border: 1px solid #2d3548;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3548;
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #6366f1; }

    .drop-zone {
      border: 2px dashed #2d3548;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #6366f1; background: #1a1f2e; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
    }
    .drop-icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .drop-hint { color: #64748b; font-size: 0.88rem; }
    .drop-hint strong { color: #94a3b8; }

    #preview-wrap { display: none; margin-top: 1rem; border-radius: 8px; overflow: hidden; border: 1px solid #2d3548; }
    #preview-img { width: 100%; max-height: 360px; object-fit: contain; background: #0a0c12; display: block; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.4rem; padding: 0.65rem 1.2rem;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: #6366f1; color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }
    .btn-primary:disabled { background: #2d3548; color: #64748b; cursor: not-allowed; }
    .btn-sm { padding: 0.25rem 0.7rem; font-size: 0.78rem; }
    .btn-ghost { background: #2d3548; color: #94a3b8; }
    .btn-ghost:hover { background: #374151; color: #e2e8f0; }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid #f8717144; }
    .btn-danger:hover { background: #f8717122; }

    #status {
      text-align: center; font-size: 0.85rem; min-height: 1.2em; margin-top: 0.5rem;
    }
    .s-loading { color: #6366f1; }
    .s-error   { color: #f87171; }
    .s-success { color: #4ade80; }

    /* Section editor */
    .sections { display: grid; gap: 1rem; }
    .section-block { border-radius: 10px; overflow: hidden; }
    .section-head {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1rem;
      font-weight: 700; font-size: 0.9rem;
    }
    .section-body { background: #1e2330; border: 1px solid #2d3548; border-top: none; border-radius: 0 0 10px 10px; padding: 0.75rem; }

    .p3 .section-head { background: #fde04718; color: #fde047; border: 1px solid #fde04733; border-radius: 10px 10px 0 0; }
    .p2 .section-head { background: #93c5fd18; color: #93c5fd; border: 1px solid #93c5fd33; border-radius: 10px 10px 0 0; }
    .p1 .section-head { background: #6ee7b718; color: #6ee7b7; border: 1px solid #6ee7b733; border-radius: 10px 10px 0 0; }

    .tag { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 999px; font-weight: 700; background: #0f1117; margin-left: auto; }

    .item-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; min-height: 1rem; }
    .item-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #0f1117; border: 1px solid #2d3548;
      border-radius: 999px; padding: 0.25rem 0.6rem;
      font-size: 0.82rem; color: #cbd5e1;
    }
    .item-chip .del {
      background: none; border: none; color: #475569; cursor: pointer;
      font-size: 0.9rem; line-height: 1; padding: 0;
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .item-chip .del:hover { color: #f87171; }

    .add-row { display: flex; gap: 0.4rem; }
    .add-row input { flex: 1; font-size: 0.82rem; padding: 0.35rem 0.6rem; }
    .add-row .btn { padding: 0.35rem 0.7rem; font-size: 0.78rem; }

    /* Unassigned */
    #unassigned-wrap { display: none; }
    .unassigned-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.5rem; }
    .ua-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #1e2330; border: 1px solid #374151;
      border-radius: 999px; padding: 0.2rem 0.55rem;
      font-size: 0.78rem; color: #94a3b8; cursor: pointer;
      transition: all 0.15s;
    }
    .ua-chip:hover { border-color: #6366f1; color: #a5b4fc; }
    .ua-select {
      appearance: none; background: #0f1117; border: 1px solid #374151;
      border-radius: 6px; padding: 0.2rem 0.4rem;
      color: #94a3b8; font-size: 0.75rem; cursor: pointer;
    }

    /* JSON output */
    #output-wrap { display: none; }
    .output-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    #json-output {
      background: #0f1117; border: 1px solid #2d3548; border-radius: 8px;
      padding: 1rem; font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 0.82rem; line-height: 1.65; color: #a3e635;
      white-space: pre; overflow-x: auto;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>星塔作業 → Preset JSON</h1>
  <p class="subtitle">上傳作業圖片，OCR 辨識後可手動修正，再輸出 preset 格式</p>

  <div class="card">
    <label>Server 網址</label>
    <input type="text" id="serverUrl" value="http://localhost:5000" placeholder="http://your-vps:5000">
  </div>

  <div class="card">
    <label>作業圖片</label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="drop-icon">🖼️</div>
      <p class="drop-hint"><strong>點擊選擇</strong>或拖曳圖片至此</p>
      <p class="drop-hint" style="font-size:0.76rem;margin-top:0.25rem;">PNG / JPG / WebP</p>
    </div>
    <div id="preview-wrap"><img id="preview-img" alt="preview"></div>
  </div>

  <button class="btn btn-primary" id="analyzeBtn" disabled>🔍 開始辨識</button>
  <p id="status"></p>

  <!-- Section editor -->
  <div id="editor-wrap" style="display:none;margin-top:1rem;">
    <div class="sections">
      <div class="section-block p3" data-p="3">
        <div class="section-head">核心 <span class="tag">3</span></div>
        <div class="section-body">
          <div class="item-list" id="list-3"></div>
          <div class="add-row">
            <input type="text" id="add-3" placeholder="手動新增 buff 名稱">
            <button class="btn btn-ghost btn-sm" onclick="addItem(3)">+ 新增</button>
          </div>
        </div>
      </div>
      <div class="section-block p2" data-p="2">
        <div class="section-head">一般 <span class="tag">2</span></div>
        <div class="section-body">
          <div class="item-list" id="list-2"></div>
          <div class="add-row">
            <input type="text" id="add-2" placeholder="手動新增 buff 名稱">
            <button class="btn btn-ghost btn-sm" onclick="addItem(2)">+ 新增</button>
          </div>
        </div>
      </div>
      <div class="section-block p1" data-p="1">
        <div class="section-head">可選 <span class="tag">1</span></div>
        <div class="section-body">
          <div class="item-list" id="list-1"></div>
          <div class="add-row">
            <input type="text" id="add-1" placeholder="手動新增 buff 名稱">
            <button class="btn btn-ghost btn-sm" onclick="addItem(1)">+ 新增</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Unassigned -->
    <div id="unassigned-wrap" class="card" style="margin-top:1rem;">
      <label>⚠️ 未分配（OCR 辨識到但無法判斷分類，點擊移入對應區塊）</label>
      <div class="unassigned-chips" id="unassigned-list"></div>
    </div>

    <button class="btn btn-primary" style="margin-top:1rem;" onclick="generateJSON()">⚙️ 生成 JSON</button>
  </div>

  <!-- Output -->
  <div id="output-wrap" class="card" style="margin-top:1rem;">
    <div class="output-head">
      <label style="margin:0">Preset JSON</label>
      <button class="btn btn-ghost btn-sm" id="copyBtn" onclick="copyJSON()">複製</button>
    </div>
    <div id="json-output"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let imageFile = null;
  const data = { 3: [], 2: [], 1: [] };

  // Server URL: persist
  const savedUrl = localStorage.getItem('ocr_server_url');
  if (savedUrl) $('serverUrl').value = savedUrl;
  $('serverUrl').addEventListener('change', () => {
    localStorage.setItem('ocr_server_url', $('serverUrl').value.trim());
  });

  // File handling
  $('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
  const dz = $('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    imageFile = file;
    const url = URL.createObjectURL(file);
    $('preview-img').src = url;
    $('preview-wrap').style.display = 'block';
    $('analyzeBtn').disabled = false;
    $('editor-wrap').style.display = 'none';
    $('output-wrap').style.display = 'none';
    setStatus('');
  }

  function setStatus(msg, cls = '') {
    $('status').textContent = msg;
    $('status').className = cls;
  }

  // Analyze
  $('analyzeBtn').addEventListener('click', async () => {
    if (!imageFile) return;
    $('analyzeBtn').disabled = true;
    setStatus('辨識中，請稍候…', 's-loading');
    $('editor-wrap').style.display = 'none';
    $('output-wrap').style.display = 'none';

    const fd = new FormData();
    fd.append('image', imageFile);

    try {
      const base = $('serverUrl').value.replace(/\/$/, '');
      const resp = await fetch(`${base}/ocr`, { method: 'POST', body: fd });
      const json = await resp.json();
      if (!resp.ok) throw new Error(json.error || `HTTP ${resp.status}`);

      // Populate editor
      [3, 2, 1].forEach(p => {
        data[p] = [...(json.grouped[p] || [])];
        renderList(p);
      });

      const ua = json.unassigned || [];
      renderUnassigned(ua);

      $('editor-wrap').style.display = 'block';
      const total = Object.values(data).flat().length;
      setStatus(`辨識完成，共 ${total} 個 buff，請確認後生成 JSON`, 's-success');
    } catch (e) {
      setStatus(`錯誤：${e.message}`, 's-error');
    } finally {
      $('analyzeBtn').disabled = false;
    }
  });

  // Render
  function renderList(p) {
    const el = $(`list-${p}`);
    el.innerHTML = '';
    data[p].forEach((name, i) => {
      const chip = document.createElement('span');
      chip.className = 'item-chip';
      chip.innerHTML = `<span class="name" contenteditable="true" spellcheck="false">${esc(name)}</span>
        <button class="del" title="刪除" onclick="removeItem(${p},${i})">×</button>`;
      chip.querySelector('.name').addEventListener('blur', e => {
        data[p][i] = e.target.textContent.trim();
      });
      el.appendChild(chip);
    });
  }

  function renderUnassigned(items) {
    const wrap = $('unassigned-wrap');
    const list = $('unassigned-list');
    list.innerHTML = '';
    if (!items.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    items.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'ua-chip';
      chip.title = '點擊選擇分類';

      const label = document.createElement('span');
      label.textContent = name;

      const sel = document.createElement('select');
      sel.className = 'ua-select';
      sel.innerHTML = `<option value="">加入…</option>
        <option value="3">核心</option>
        <option value="2">一般</option>
        <option value="1">可選</option>`;
      sel.addEventListener('change', () => {
        const p = parseInt(sel.value);
        if (!p) return;
        if (!data[p].includes(name)) { data[p].push(name); renderList(p); }
        chip.remove();
        if (!list.children.length) wrap.style.display = 'none';
      });

      chip.appendChild(label);
      chip.appendChild(sel);
      list.appendChild(chip);
    });
  }

  function removeItem(p, i) {
    data[p].splice(i, 1);
    renderList(p);
  }

  function addItem(p) {
    const input = $(`add-${p}`);
    const val = input.value.trim();
    if (!val) return;
    if (!data[p].includes(val)) { data[p].push(val); renderList(p); }
    input.value = '';
  }

  // Enter key in add inputs
  [3, 2, 1].forEach(p => {
    $(`add-${p}`).addEventListener('keydown', e => { if (e.key === 'Enter') addItem(p); });
  });

  // Generate JSON
  function generateJSON() {
    // Re-read editable names
    [3, 2, 1].forEach(p => {
      data[p] = [...$(`list-${p}`).querySelectorAll('.name')].map(el => el.textContent.trim()).filter(Boolean);
    });

    const out = {};
    [3, 2, 1].forEach(p => { if (data[p].length) out[p] = data[p]; });
    $('json-output').textContent = JSON.stringify(out, null, 2);
    $('output-wrap').style.display = 'block';
    $('output-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyJSON() {
    navigator.clipboard.writeText($('json-output').textContent).then(() => {
      $('copyBtn').textContent = '已複製 ✓';
      setTimeout(() => $('copyBtn').textContent = '複製', 2000);
    });
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
